name: Deploy to EC2

on:
  push:
    branches: [ "main" ] # main 브랜치에 푸시하면 작동

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      # 1. 최신 코드 가져오기 (v4로 업데이트해서 Node 20 경고 해결)
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Check Secrets
        run : |
          if [ -z "${{ secrets.DOCKER_USERNAME }}" ]; then echo "DOCKER_USERNAME is EMPTY"; else echo "DOCKER_USERNAME is SET"; fi
          if [ -z "${{ secrets.DOCKER_PASSWORD }}" ]; then echo "DOCKER_PASSWORD is EMPTY"; else echo "DOCKER_PASSWORD is SET"; fi

      # 2. 도커 허브 로그인 (전용 Action 사용으로 'interactive login' 에러 원천 봉쇄)
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # 3. 도커 이미지 빌드 및 푸시
      - name: Build and push Docker image
        run: |
          # 💡 DOCKER_USERNAME이 비어있으면 여기서 에러가 나니 꼭 Secrets 확인!
          docker build -t ${{ secrets.DOCKER_USERNAME }}/node-blog:latest .
          docker push ${{ secrets.DOCKER_USERNAME }}/node-blog:latest

      # 4. EC2 서버 접속 및 배포 실행
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3 # 최신 버전 사용
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # 서버에서 도커 명령어 실행
            sudo docker pull ${{ secrets.DOCKER_USERNAME }}/node-blog:latest
            sudo docker stop my-blog || true
            sudo docker rm my-blog || true
            sudo docker run -d -p 80:8080 --name my-blog \
              -e DB_PASSWORD='${{ secrets.DB_PASSWORD }}' \
              -e SESSION_SECRET='${{ secrets.SESSION_SECRET }}' \
              ${{ secrets.DOCKER_USERNAME }}/node-blog:latest
            # 안 쓰는 오래된 이미지들 정리 (서버 용량 관리)
            sudo docker image prune -f